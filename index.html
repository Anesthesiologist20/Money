<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <!-- وسم Fullscreen للآيفون (PWA) -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="ميزانيتي">
    
    <title>سجل الميزانية المعتمد</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@300;400;600;700;900&display=swap');
        
        :root {
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
        }

        body { 
            font-family: 'Noto Sans Arabic', sans-serif; 
            background-color: #f8fafc; 
            color: #1e293b;
            padding-top: var(--safe-top);
            padding-bottom: var(--safe-bottom);
            -webkit-user-select: none;
        }

        .card-shadow { box-shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.05); }
        .progress-bar { transition: width 1.5s ease-in-out; }
        .hidden { display: none; }
        
        /* تحسينات الواجهة لتطبيق الجوال */
        .sticky-header {
            position: sticky;
            top: 0;
            z-index: 50;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding-top: calc(var(--safe-top) + 0.5rem);
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="antialiased no-scrollbar">

    <!-- Sticky Header -->
    <nav class="sticky-header border-b border-slate-200 px-6 py-4 shadow-sm">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-12 h-12 bg-indigo-600 text-white rounded-2xl flex items-center justify-center shadow-lg">

                </div>

                <span class="text-[10px] font-black">مزامنة نشطة</span>

        </div>
    </nav>

                            <p class="text-xl font-bold" id="txCount">٠</p>
                        </div>
                        <div class="bg-white/10 px-5 py-3 rounded-2xl border border-white/5 backdrop-blur-md">
                            <p class="text-[9px] text-slate-400 font-black uppercase">الأيام</p>
                            <p class="text-xl font-bold" id="dayCount">٠</p>
                        </div>
                    </div>
                </div>
                <i class="fas fa-sack-dollar absolute -right-10 -bottom-10 text-[260px] opacity-5 rotate-12"></i>
            </div>

            <!-- Smart Input Card -->

                <p class="text-xs opacity-70 mt-1 leading-relaxed">احفظ مصروفاتك الجديدة سحابياً</p>
            </div>
        </section>

        <!-- Category Analysis -->

            <h3 class="text-xl font-black text-slate-800 mb-8 flex items-center gap-3">
                <i class="fas fa-chart-pie text-indigo-500"></i> تحليل الفئات المعتمد

            <div id="categoryGrid" class="grid grid-cols-1 md:grid-cols-2 gap-x-12 gap-y-8">
                <!-- JS Inject -->
            </div>
        </section>

        <!-- Search Bar -->
        <section class="max-w-md mx-auto">
            <div class="relative">

            </div>
        </section>

        <!-- History Timeline -->
        <section id="dailyTimeline" class="space-y-10 relative">
            <!-- Days injected here -->
        </section>
    </main>

            return dates.sort((a, b) => {
                const [da, ma] = a.split('/').map(n => parseInt(n.trim()));
                const [db, mb] = b.split('/').map(n => parseInt(n.trim()));
                const ya = ma === 12 ? 2025 : 2026;
                const yb = mb === 12 ? 2025 : 2026;
                return (yb * 10000 + mb * 100 + db) - (ya * 10000 + ma * 100 + da);
            });

            const filtered = all.filter(x => x.i.toLowerCase().includes(q) || x.c.toLowerCase().includes(q));

            const total = filtered.reduce((s, x) => s + x.a, 0);
            const distinctDays = [...new Set(all.map(x => x.d))];
            
            document.getElementById('totalDisplay').innerText = total.toLocaleString() + ' ر.س';
            document.getElementById('txCount').innerText = filtered.length;
            document.getElementById('dayCount').innerText = distinctDays.length;

            const cats = {};
            filtered.forEach(x => cats[x.c] = (cats[x.c] || 0) + x.a);

                    </div>
                    <div class="h-1.5 bg-slate-100 rounded-full overflow-hidden">

                    </div>
                </div>
            `).join('');

            const input = document.getElementById('smartInput');
            if (!input.value.trim()) return;
            document.getElementById('loader').classList.remove('hidden');
            document.getElementById('saveBtn').disabled = true;

            try {
                const today = new Date();
                const dStr = `${today.getDate()} / ${today.getMonth()+1}`;
                const prompt = `Extract expense JSON: { "d": "${dStr}", "i": "item", "a": amount, "c": "category" }. Cats: قهوة, تموينات, سيارة, فواتير, التزامات, عائلة, ترفيه, صحة, تقنية, تمويل, منزل, عمل, أخرى. Input: "${input.value}"`;
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST', body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                const r = await res.json();
                const entry = JSON.parse(r.candidates[0].content.parts[0].text.replace(/```json/g, '').replace(/```/g, '').trim());

                input.value = '';
                toggleModal(false);
            } catch(e) { console.error(e); }
            finally {
                document.getElementById('loader').classList.add('hidden');
                document.getElementById('saveBtn').disabled = false;
